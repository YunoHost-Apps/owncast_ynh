packaging_format = 2

id = "owncast"
name = "Owncast"
description.en = "Live video and web chat server"
description.fr = "Serveur de vidéo en direct et de chat Web"

version = "0.2.5~ynh1"

maintainers = []

[upstream]
license = "MIT"
website = "https://owncast.online/"
demo = "https://watch.owncast.online/"
admindoc = "https://owncast.online/docs/"
code = "https://github.com/owncast/owncast"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "armhf", "arm64"]
multi_instance = false

ldap = false
sso = false

disk = "50M"
ram.build = "150M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    help.en = "If enabled, Owncast will be accessible by people who do not have an account. This can be changed later via the webadmin."
    help.fr = "Si cette case est cochée, Owncast sera accessible aux personnes n’ayant pas de compte. Vous pourrez changer ceci plus tard via la webadmin."
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

        [resources.sources.main]
        amd64.url = "https://github.com/owncast/owncast/releases/download/v0.2.5/owncast-0.2.5-linux-64bit.zip"
        amd64.sha256 = "3a197c123d80e5902e70691483180c3305b7784e7c6efcd26730bfd0d5bbd465"
        arm64.url = "https://github.com/owncast/owncast/releases/download/v0.2.5/owncast-0.2.5-linux-arm64.zip"
        arm64.sha256 = "4b2b9db1d2f899b854d1c670626f839ae7da6808daef4d73f0208432e16e1c65"
        armhf.url = "https://github.com/owncast/owncast/releases/download/v0.2.5/owncast-0.2.5-linux-arm7.zip"
        armhf.sha256 = "b6d5b1f06b3f5b78ea3c2af1bf582c1cae521235632af0c9383f4f7af0527738"
        in_subdir = false
        autoupdate.strategy = "latest_github_release"
        autoupdate.asset.amd64 = ".*-linux-64bit.zip"
        autoupdate.asset.arm64 = ".*-linux-arm64.zip"
        autoupdate.asset.armhf = ".*-linux-arm7.zip"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"
    main.auth_header = false

    [resources.ports]
    stream.default = 1935
    stream.exposed = "TCP"

    [resources.apt]
    packages = "ffmpeg"
